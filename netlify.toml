# Netlify build settings — pinned in the repo so the UI config can't drift.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: Mintly uses hash routing so this is rarely hit, but it makes
# any deep link or refresh resolve to the app instead of a 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
