server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json font/woff2;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML entry so updates are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # App uses hash routing, but fall back to index.html for any deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
