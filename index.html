<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./Icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0f13" />
    <title>Mintly — Financial control</title>
    <style>
      :root {
        --bg: oklch(0.16 0.008 255);
        --bg-2: oklch(0.185 0.009 255);
        --surface: oklch(0.205 0.01 255);
        --surface-2: oklch(0.235 0.012 255);
        --surface-hi: oklch(0.27 0.014 255);
        --line: oklch(1 0 0 / 0.08);
        --line-2: oklch(1 0 0 / 0.045);
        --text: oklch(0.97 0.004 255);
        --text-2: oklch(0.74 0.012 255);
        --text-3: oklch(0.56 0.012 255);

        --accent: oklch(0.82 0.15 155);
        --accent-ink: oklch(0.3 0.09 155);
        --blue: oklch(0.78 0.13 250);
        --amber: oklch(0.83 0.14 75);
        --violet: oklch(0.76 0.13 305);
        --rose: oklch(0.74 0.15 18);
        --teal: oklch(0.78 0.13 200);

        --r-sm: 10px;
        --r: 16px;
        --r-lg: 22px;
        --r-xl: 28px;
        --pad: 22px;
        --shadow: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 18px 40px -24px oklch(0 0 0 / 0.7);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
      body {
        font-family: "Space Grotesk", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
      .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
      .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1, "ss01" 1; }
      .eyebrow {
        font-family: "IBM Plex Mono", monospace; font-size: 11px; font-weight: 500;
        letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3);
      }
      h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.02em; }
      button { font-family: inherit; cursor: pointer; }
      input, select { font-family: inherit; }
      a { color: var(--accent); }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 20px; border: 3px solid var(--bg); }
      ::selection { background: var(--accent); color: #06150c; }

      .app-bg {
        background:
          radial-gradient(1200px 600px at 80% -10%, oklch(0.82 0.15 155 / 0.06), transparent 60%),
          radial-gradient(900px 500px at -5% 0%, oklch(0.78 0.13 250 / 0.05), transparent 55%),
          var(--bg);
      }
      [data-density="compact"] { --pad: 16px; --r: 14px; --r-lg: 18px; }
      [data-density="comfy"] { --pad: 28px; }

      @keyframes fadeUp { from { transform: translateY(9px); } to { transform: none; } }
      @keyframes growW { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: none; } }
      .fadeup { animation: fadeUp 0.5s cubic-bezier(0.2, 0.7, 0.2, 1); }
      @media (prefers-reduced-motion: reduce) { .fadeup, * { animation-duration: 0.001s !important; } }

      input:focus-visible, select:focus-visible, button:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px;
      }

      .device-bg {
        min-height: 100vh; min-height: 100dvh;
        display: flex; align-items: center; justify-content: center;
      }
      @media (min-width: 560px) { .device-bg { padding: 28px; } }

      .phone {
        position: relative; width: 100%; max-width: 440px;
        height: 100vh; height: 100dvh;
        display: flex; flex-direction: column; overflow: hidden; background: var(--bg);
      }
      @media (min-width: 560px) {
        .phone {
          height: min(948px, calc(100vh - 56px)); border-radius: 46px;
          box-shadow: 0 0 0 11px oklch(0.115 0.006 255), 0 0 0 12px oklch(1 0 0 / 0.06),
            0 50px 90px -20px oklch(0 0 0 / 0.85);
        }
      }
      .app-status {
        flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
        padding: 13px 26px 2px; font-family: "IBM Plex Mono", monospace; font-size: 13.5px; font-weight: 600;
      }
      .app-head {
        flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;
      }
      .app-scroll {
        flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
        padding: 4px 15px 26px; scrollbar-width: thin;
      }
      .app-scroll::-webkit-scrollbar { width: 5px; }
      .app-tabs {
        flex: 0 0 auto; display: flex; gap: 1px;
        padding: 7px 6px calc(7px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: color-mix(in oklch, var(--bg-2) 82%, transparent); backdrop-filter: blur(18px);
      }
    </style>
  </head>
  <body class="app-bg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
