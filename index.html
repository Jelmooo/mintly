<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./Icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0f13" />
    <title>Mintly — Financial control</title>
    <style>
      :root {
        --bg: oklch(0.16 0.008 255);
        --bg-2: oklch(0.185 0.009 255);
        --surface: oklch(0.205 0.01 255);
        --surface-2: oklch(0.235 0.012 255);
        --surface-hi: oklch(0.27 0.014 255);
        --line: oklch(1 0 0 / 0.08);
        --line-2: oklch(1 0 0 / 0.045);
        --text: oklch(0.97 0.004 255);
        --text-2: oklch(0.74 0.012 255);
        --text-3: oklch(0.56 0.012 255);

        --accent: oklch(0.82 0.15 155);
        --accent-ink: oklch(0.3 0.09 155);
        --blue: oklch(0.78 0.13 250);
        --amber: oklch(0.83 0.14 75);
        --violet: oklch(0.76 0.13 305);
        --rose: oklch(0.74 0.15 18);
        --teal: oklch(0.78 0.13 200);

        --r-sm: 10px;
        --r: 16px;
        --r-lg: 22px;
        --r-xl: 28px;
        --pad: 22px;
        --shadow: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 18px 40px -24px oklch(0 0 0 / 0.7);
        --maxw: 1180px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
      body {
        font-family: "Space Grotesk", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
      .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; }
      .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1, "ss01" 1; }
      .eyebrow {
        font-family: "IBM Plex Mono", monospace; font-size: 11px; font-weight: 500;
        letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3);
      }
      h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.02em; }
      button { font-family: inherit; cursor: pointer; }
      input, select { font-family: inherit; }
      a { color: var(--accent); }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 20px; border: 3px solid var(--bg); }
      ::selection { background: var(--accent); color: #06150c; }

      .app-bg {
        background:
          radial-gradient(1200px 600px at 80% -10%, oklch(0.82 0.15 155 / 0.06), transparent 60%),
          radial-gradient(900px 500px at -5% 0%, oklch(0.78 0.13 250 / 0.05), transparent 55%),
          var(--bg);
      }

      @keyframes fadeUp { from { transform: translateY(9px); } to { transform: none; } }
      @keyframes growW { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      @keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: none; } }
      .fadeup { animation: fadeUp 0.5s cubic-bezier(0.2, 0.7, 0.2, 1); }
      @media (prefers-reduced-motion: reduce) { .fadeup, * { animation-duration: 0.001s !important; } }

      input:focus-visible, select:focus-visible, button:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 2px;
      }

      /* ---------- website shell ---------- */
      body { background:
        radial-gradient(1200px 600px at 80% -10%, oklch(0.82 0.15 155 / 0.06), transparent 60%),
        radial-gradient(900px 500px at -5% 0%, oklch(0.78 0.13 250 / 0.05), transparent 55%),
        var(--bg); }

      body { overflow-x: hidden; }
      .site { min-height: 100vh; display: flex; flex-direction: column; }
      .site-head {
        position: sticky; top: 0; z-index: 80;
        display: flex; align-items: center; justify-content: space-between; gap: 14px;
        padding: 12px clamp(16px, 4vw, 30px);
        background: color-mix(in oklch, var(--bg) 86%, transparent);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--line);
      }
      .brand { display: flex; align-items: center; gap: 10px; }
      .head-right { display: flex; align-items: center; gap: 8px; }
      .head-btn {
        width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center;
        background: var(--surface-2); border: 1px solid var(--line); color: var(--text-2);
      }
      .head-btn:hover { color: var(--text); }

      .site-main {
        width: 100%; max-width: var(--maxw); margin: 0 auto; flex: 1;
        padding: 20px clamp(14px, 4vw, 30px) calc(92px + env(safe-area-inset-bottom));
      }

      /* nav: bottom tab bar on mobile, pill row under the header on desktop */
      .tabs {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
        display: flex; gap: 1px;
        padding: 7px 6px calc(7px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: color-mix(in oklch, var(--bg-2) 82%, transparent); backdrop-filter: blur(18px);
      }
      .tab-btn {
        display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1;
        background: none; border: none; color: var(--text-3); padding: 6px 1px;
      }
      .tab-btn span { font-size: 9.5px; font-weight: 600; letter-spacing: -0.01em; }
      .tab-btn.on { color: var(--accent); }

      @media (min-width: 860px) {
        .site-main { padding-bottom: 48px; }
        .tabs {
          position: static; border-top: none; background: none; backdrop-filter: none;
          width: 100%; max-width: var(--maxw); margin: 14px auto 0;
          padding: 0 clamp(14px, 4vw, 30px); gap: 8px;
        }
        .tab-btn {
          flex: 0 0 auto; flex-direction: row; gap: 8px; padding: 9px 16px;
          border-radius: 999px; border: 1px solid transparent; color: var(--text-2);
        }
        .tab-btn span { font-size: 13.5px; }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.on { background: var(--surface-2); border-color: var(--line); color: var(--accent); }
      }

      /* responsive two-column grids (single column on small screens) */
      .grid2 { display: grid; gap: 18px; grid-template-columns: 1fr; align-items: start; }
      @media (min-width: 900px) {
        .grid2.ov { grid-template-columns: 1.4fr 1fr; }
        .grid2.pers { grid-template-columns: 1.5fr 1fr; }
        .grid2.inc { grid-template-columns: 1.2fr 1fr; align-items: center; }
      }

      /* sheets: bottom sheet on mobile, centered dialog on desktop */
      .sheet-wrap {
        position: fixed; inset: 0; z-index: 200; background: oklch(0 0 0 / 0.55);
        backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center;
      }
      .sheet-card {
        width: min(540px, 100%); background: var(--surface); border: 1px solid var(--line);
        border-radius: var(--r-xl) var(--r-xl) 0 0;
        box-shadow: 0 -10px 60px -10px oklch(0 0 0 / 0.8);
        animation: pop 0.26s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        max-height: 92%; display: flex; flex-direction: column;
      }
      @media (min-width: 860px) {
        .sheet-wrap { align-items: center; padding: 28px; }
        .sheet-card { border-radius: var(--r-xl); max-height: 86vh; }
      }

      /* full-screen overlays */
      .onboarding { position: fixed; inset: 0; z-index: 160; background: var(--bg); display: flex; flex-direction: column; }
      .onb-col { width: 100%; max-width: 560px; margin: 0 auto; }

      .login {
        min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 22px; text-align: center; padding: 32px 22px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
